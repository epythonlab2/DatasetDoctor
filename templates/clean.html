<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DatasetDoctor - Intelligence at the Source</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/custom_dialog.css">
 
<body>
<div class="custom-dialog">

    <header class="custom-header mb-5">
        <div class="d-flex-custom align-items-center justify-content-between">
            <div class="d-flex-custom align-items-center gap-3">
                
                <div>
                <i data-lucide="sparkles" class="text-primary" style="width: 24px; height: 24px;"></i>
                    <h2 class="h4 fw-bold mb-0" style="letter-spacing: -0.02em;">DatasetDoctor .Data Cleaning</h2>
                    <p class="small text-muted mb-0">Engine V3.0 • Advanced Cleaning Suite</p>
                </div>
            </div>
            <div class="live-indicator position-relative">
                <span class="ping"></span>
                <span class="dot"></span>
                <span class="small fw-bold text-muted ms-4">Ready</span>
            </div>
        </div>
    </header>

    <section class="mb-4">
        <div class="quality-score-hero border-custom shadow-sm" style="background: linear-gradient(to right, #ffffff, #f8fafc);">
            <div class="d-flex-custom align-items-center justify-content-between flex-wrap gap-3">
                <div class="d-flex-custom align-items-center gap-3">
                    <div class="mini-icon icon-purple" style="width: 42px; height: 42px; border-radius: 12px;">
                        <i data-lucide="layers-2" style="width: 20px;"></i>
                    </div>
                    <div>
                        <strong class="d-block mb-1">Remove Duplicate Entries</strong>
                        <p class="small text-muted mb-0">Cleanse the dataset by removing exact row-level overlaps.</p>
                    </div>
                </div>
                <button id="btn-dedupe"
		    data-dataset-id="" 
		    class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm" 
		    onclick="DataDeduplicator.run()" 
		    style="font-size: 0.85rem;">
		    Run Deduplication
		</button>
            </div>
        </div>
    </section>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="feature-mini-card h-100 border-custom shadow-sm p-4">
                <div class="d-flex-custom align-items-center gap-3 mb-4">
                    <div class="mini-icon icon-green" style="border-radius: 10px;"><i data-lucide="database-zap"></i></div>
                    <h3 class="h6 mb-0 fw-bold">Smart Imputation</h3>
                </div>

                <div class="control-group mb-3">
                    <label class="small fw-bold text-muted mb-2 d-flex align-items-center gap-2">
                        <i data-lucide="columns" style="width:14px;"></i> Target Column
                    </label>
                    <select class="form-select custom-select">
                        <option selected disabled>Select a column...</option>
                        <option>Age (Numeric)</option>
                        <option>Status (Categorical)</option>
                    </select>
                </div>

                <div class="control-group mb-4">
                    <label class="small fw-bold text-muted mb-2 d-flex align-items-center gap-2">
                        <i data-lucide="settings-2" style="width:14px;"></i> Method
                    </label>
                    <select class="form-select custom-select">
                        <option value="mean">Mean (Average)</option>
                        <option value="median">Median (Middle Point)</option>
                        <option value="mode">Mode (Most Frequent)</option>
                        <option value="constant">Constant Value</option>
                    </select>
                </div>

                <button class="btn btn-outline-primary w-100 rounded-pill fw-bold mt-auto py-2" style="font-size: 0.85rem; border-width: 2px;">
                    Apply Imputation
                </button>
            </div>
        </div>

        <div class="col-md-6">
            <div class="feature-mini-card h-100 border-custom shadow-sm p-4">
                <div class="d-flex-custom align-items-center gap-3 mb-4">
                    <div class="mini-icon icon-blue" style="border-radius: 10px;"><i data-lucide="binary"></i></div>
                    <h3 class="h6 mb-0 fw-bold">Schema Casting</h3>
                </div>

                <div class="control-group mb-3">
                    <label class="small fw-bold text-muted mb-2 d-flex align-items-center gap-2">
                        <i data-lucide="type" style="width:14px;"></i> Select Column
                    </label>
                    <select class="form-select custom-select">
                        <option selected disabled>Select a column...</option>
                        <option>Created_At</option>
                        <option>Order_Total</option>
                    </select>
                </div>

                <div class="control-group mb-4">
                    <label class="small fw-bold text-muted mb-2 d-flex align-items-center gap-2">
                        <i data-lucide="refresh-cw" style="width:14px;"></i> Desired Type
                    </label>
                    <select class="form-select custom-select">
                        <option value="int">Integer (Int64)</option>
                        <option value="float">Float (Float64)</option>
                        <option value="string">String (Object)</option>
                        <option value="date">DateTime</option>
                    </select>
                </div>

                <button class="btn btn-outline-primary w-100 rounded-pill fw-bold mt-auto py-2" style="font-size: 0.85rem; border-width: 2px;">
                    Convert Schema
                </button>
            </div>
        </div>
    </div>

    <footer class="mt-5 pt-4 border-top d-flex-custom justify-content-between align-items-center">
        <div class="d-flex-custom align-items-center gap-2">
            <span class="badge-custom bg-primary-soft text-primary px-3">Auto-Save Active</span>
        </div>
        <div class="d-flex-custom gap-3">
            <button class="btn btn-link text-muted text-decoration-none small fw-bold" onclick="About.close()">Discard</button>
            <button class="btn btn-dark px-4 rounded-pill fw-bold shadow" onclick="About.close()">
                Finalize Changes
            </button>
        </div>
       <p class="text-muted" style="font-size: 0.7rem; padding:10px;">© 2026 DatasetDoctor Intelligence System</p>
        </footer>

    </div>
</div>


</body>
