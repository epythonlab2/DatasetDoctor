<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DatasetDoctor | Uploader</title>
    <meta name="description" content="Diagnose ML readiness with Dataset Doctor. Automate data cleaning, outlier detection, data leakage checks, handle missing data, and fix mismatches fast.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='M22 12h-4l-3 9L9 3l-3 9H2'></path></svg>" />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="stylesheet" href="/static/css/uploader.css" />
  </head>

  <body class="upload-page">
    <main class="dashboard-container">
      <!-- Stepper now reflects the hand-off flow -->
      <div class="stepper">
        <div class="step active">1. Upload Data</div>
        <div class="step">2. Preview</div>
        <div class="step">3. Diagnostic Scan</div>
        <div class="step">4. Health Report</div>
      </div>

      <header class="upload-hero">
        <h1>Dataset <span class="gradient-text">Health Check</span></h1>
        <p>Upload your data to initialize the high-performance diagnostic engine.</p>
      </header>

      <section class="card upload-card" id="dropzone">
        <input type="file" id="upload" accept=".csv" hidden />
        <label for="upload" class="upload-label" id="upload-ui">
          <div class="upload-icon-wrapper">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </div>
          <div class="upload-text">
            <p><strong>Click to upload</strong> or drag and drop</p>
            <small>Supports CSV (Max 200MB)</small>
          </div>
        </label>

        <!-- Loading state stays here to show upload progress -->
        <div id="loading-state" class="hidden">
          <div class="progress-header">
            <h3 id="status-text">Uploading data...</h3>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="file-info">File: <span id="file-name-display">-</span></p>
        </div>
      </section>
    </main>

    <footer class="custom-footer">
      <p class="footer-small">© 2026 <strong>DatasetDoctor</strong> Intelligence System</p>
      <span class="footer-tiny">Engine V3.0</span>
    </footer>

    <script type="module" src="/static/js/uploader.js"></script>
  </body>
</html>
